<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="800" height="400" rx="20" fill="#0F172A"/>
  <rect x="2" y="2" width="796" height="396" rx="18" stroke="#1E293B" stroke-width="1"/>

  <!-- 标题与得分 -->
  <text x="40" y="60" fill="#F1F5F9" font-family="sans-serif" font-size="24" font-weight="bold">Performance Pulse</text>
  <text x="40" y="85" fill="#94A3B8" font-family="sans-serif" font-size="14">Based on BG-1 Weighted Algorithm (Recent 25)</text>
  
  <text x="760" y="65" fill="#FBBF24" font-family="monospace" font-size="36" font-weight="bold" text-anchor="end">542.8</text>
  <text x="760" y="85" fill="#94A3B8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="end">CURRENT RATING</text>

  <!-- 网格线 -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="#1E293B" stroke-dasharray="4 4"/>
  <line x1="60" y1="200" x2="740" y2="200" stroke="#1E293B" stroke-dasharray="4 4"/>
  <line x1="60" y1="250" x2="740" y2="250" stroke="#1E293B" stroke-dasharray="4 4"/>
  <line x1="60" y1="300" x2="740" y2="300" stroke="#1E293B" stroke-dasharray="4 4"/>

  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#60A5FA" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 折线 -->
  <path d="M60 280 L90 260 L120 270 L150 240 L180 250 L210 210 L240 230 L270 190 L300 200 L330 170 L360 185 L390 155 L420 165 L450 135 L480 145 L510 120 L540 130 L570 100 L600 115 L630 90 L660 110 L690 75 L720 85 L740 65" 
        stroke="url(#lineGrad)" stroke-width="4" fill="none" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- 数据点 (BG-1 权重视觉化) -->
  <!-- 历史点 -->
  <circle cx="60" cy="280" r="3" fill="#3B82F6" opacity="0.3"/>
  <circle cx="180" cy="250" r="3" fill="#3B82F6" opacity="0.4"/>
  <circle cx="390" cy="155" r="4" fill="#60A5FA" opacity="0.6"/>
  <!-- 最近对局 (高权重 + 发光) -->
  <circle cx="690" cy="75" r="6" fill="#FBBF24" filter="url(#glow)"/>
  <circle cx="690" cy="75" r="2" fill="white"/>
  
  <circle cx="740" cy="65" r="8" fill="#FBBF24" filter="url(#glow)"/>
  <circle cx="740" cy="65" r="3" fill="white"/>

  <!-- 底部图例 -->
  <text x="60" y="350" fill="#94A3B8" font-family="sans-serif" font-size="10">25 MATCHES AGO</text>
  <circle cx="340" cy="346" r="4" fill="#FBBF24"/>
  <text x="350" y="350" fill="#F1F5F9" font-family="sans-serif" font-size="10">HOT STREAK</text>
  <text x="740" y="350" fill="#94A3B8" font-family="sans-serif" font-size="10" text-anchor="end">LATEST (HIGH WEIGHT)</text>
</svg>
